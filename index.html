<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chatting Hub</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-surface: #1C1B1F;
            --md-sys-color-surface-container: #2B2930;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-outline: #938F99;
            --md-sys-color-primary-container: #49454F;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); height: 100vh; overflow: hidden; }

        /* 页面切换动画 */
        .page { 
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            z-index: 1;
        }
        .page.hidden { transform: translateY(30px); opacity: 0; pointer-events: none; z-index: 0; }

        /* --- 注册登录页面 (Page 1) --- */
        #auth-page { align-items: center; justify-content: center; background: var(--md-sys-color-surface); }
        .auth-card {
            background: var(--md-sys-color-surface-container);
            padding: 40px 30px; border-radius: 28px; width: 90%; max-width: 360px;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .md-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--md-sys-color-outline);
            border-radius: 12px; padding: 16px; color: white; margin-bottom: 16px; font-size: 16px; outline: none;
            transition: border 0.3s;
        }
        .md-input:focus { border-color: var(--md-sys-color-primary); }
        .btn-large {
            background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);
            border: none; padding: 16px; border-radius: 100px; width: 100%; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 10px;
        }

        /* --- 聊天主页面 (Page 2) --- */
        #chat-page { background: var(--md-sys-color-surface); }
        header.top-bar { height: 64px; background: var(--md-sys-color-surface-container); display: flex; align-items: center; padding: 0 16px; justify-content: space-between; }
        .chat-content { flex: 1; display: flex; overflow: hidden; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        #msg-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        
        /* 气泡样式 (MD3) */
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 15px; position: relative; }
        .me { background: var(--md-sys-color-primary-container); align-self: flex-end; border-bottom-right-radius: 4px; }
        .others { background: var(--md-sys-color-surface-container); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* 输入栏 */
        .input-bar { padding: 12px 16px; display: flex; gap: 12px; align-items: center; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        .input-pill { flex: 1; background: var(--md-sys-color-surface-container); border: none; border-radius: 28px; padding: 14px 20px; color: white; outline: none; }
        .btn-send { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border: none; width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }

        .side-nav { width: 56px; background: var(--md-sys-color-surface-container); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 24px; }
    </style>
</head>
<body>

    <div id="auth-page" class="page">
        <div class="auth-card">
            <span class="material-icons-outlined" style="font-size:64px; color:var(--md-sys-color-primary)">rocket_launch</span>
            <h1 style="font-size:24px; margin:20px 0 10px; color:var(--md-sys-color-primary)">欢迎来到 Hub</h1>
            <p style="font-size:14px; opacity:0.6; margin-bottom:30px;">MayOS 身份认证系统</p>
            
            <input type="email" id="email" placeholder="电子邮箱" class="md-input">
            <input type="password" id="password" placeholder="通行密码" class="md-input">
            
            <button id="auth-btn" class="btn-large">认证并进入</button>
            <p id="auth-tip" style="font-size:12px; margin-top:15px; opacity:0.5;">未注册账号将自动创建</p>
        </div>
    </div>

    <div id="chat-page" class="page hidden">
        <header class="top-bar">
            <div style="display:flex; align-items:center; gap:10px; color:var(--md-sys-color-primary)">
                <span class="material-icons-outlined">hub</span>
                <span style="font-weight:bold;">Chatting Hub Home</span>
            </div>
            <span id="user-display" style="font-size:12px; opacity:0.7;"></span>
        </header>

        <div class="chat-content">
            <main class="chat-main">
                <div style="padding:10px 16px; font-size:11px; opacity:0.5; display:flex; justify-content:space-between;">
                    <span># PUBLIC_ROOM</span>
                    <span id="online-count">● 1 人在线</span>
                </div>
                <div id="msg-list"></div>
                <div class="input-bar">
                    <input type="text" id="msg-input" class="input-pill" placeholder="键入消息...">
                    <button id="send-btn" class="btn-send"><span class="material-icons-outlined">send</span></button>
                </div>
            </main>
            <nav class="side-nav">
                <span class="material-icons-outlined" style="color:var(--md-sys-color-primary)">auto_awesome</span>
                <span class="material-icons-outlined" style="opacity:0.3">settings</span>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNc6yYv1Tg9wBTpaRFXobubDAFzWpddrM",
            authDomain: "chats-10095.firebaseapp.com",
            projectId: "chats-10095",
            storageBucket: "chats-10095.firebasestorage.app",
            messagingSenderId: "966848788239",
            appId: "1:966848788239:web:217e96f386f0af5744707a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 页面跳转逻辑 ---
        function navigateToChat() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('chat-page').classList.remove('hidden');
        }

        // --- 认证逻辑 ---
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const tip = document.getElementById('auth-tip');

            if (!email || pass.length < 6) {
                alert("请输入正确的邮箱和至少6位密码");
                return;
            }

            tip.innerText = "正在认证中...";
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                if(confirm("账号不存在，是否以此凭证注册新身份？")){
                    const name = prompt("你的 ID 昵称？") || "探险者";
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: name });
                } else {
                    tip.innerText = "未注册账号将自动创建";
                }
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display').innerText = user.displayName;
                navigateToChat(); // 成功后跳转
                startChatSystem();
            }
        });

        // --- 聊天系统 ---
        function startChatSystem() {
            // 消息监听
            const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('msg-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === auth.currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `bubble ${isMe ? 'me' : 'others'}`;
                    const time = m.createdAt ? m.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
                    div.innerHTML = `
                        ${!isMe ? `<div style="font-size:10px; font-weight:bold; color:var(--md-sys-color-primary); margin-bottom:4px;">${m.sender}</div>` : ''}
                        <div>${m.text}</div>
                        <div style="font-size:9px; opacity:0.5; margin-top:4px; text-align:right;">${time}</div>
                    `;
                    list.appendChild(div);
                });
                setTimeout(() => { list.scrollTop = list.scrollHeight; }, 100);
            });

            // 在线人数心跳 (30秒打卡一次)
            const updateStatus = () => setDoc(doc(db, "status", auth.currentUser.uid), { lastSeen: serverTimestamp() }, { merge: true });
            updateStatus();
            setInterval(updateStatus, 30000);

            onSnapshot(collection(db, "status"), (snap) => {
                let count = 0;
                const now = Date.now();
                snap.forEach(d => {
                    if(d.data().lastSeen && (now - d.data().lastSeen.toDate().getTime() < 90000)) count++;
                });
                document.getElementById('online-count').innerText = `● ${count} 人在线`;
            });
        }

        // 发送消息
        const sendMessage = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            const text = input.value;
            input.value = '';
            await addDoc(collection(db, "messages"), {
                text: text,
                sender: auth.currentUser.displayName,
                uid: auth.currentUser.uid,
                createdAt: serverTimestamp()
            });
        };
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') sendMessage(); };
    </script>
</body>
</html>
